id: no-s4-dispatch-sleep
language: Rust
severity: error
message: S4 dispatch must not sleep or throttle between transaction submissions.
rule:
  any:
    - pattern: tokio::time::sleep($$$ARGS)
    - pattern: tokio::time::sleep_until($$$ARGS)
    - pattern: time::sleep($$$ARGS)
    - pattern: time::sleep_until($$$ARGS)
    - pattern: std::thread::sleep($$$ARGS)
    - pattern: sleep($$$ARGS)
    - pattern: sleep_until($$$ARGS)
files:
  - src/**/*.rs
