id: no-hidden-utxo-partitioning
language: Rust
severity: error
message: Do not hide wallet behavior with harness-level UTXO pre-partitioning.
rule:
  any:
    - pattern: pre_partition($$$ARGS)
    - pattern: prepartition($$$ARGS)
    - pattern: partition_utxos($$$ARGS)
    - pattern: $VALUE.chunks($$$ARGS)
    - pattern: $VALUE.partition($$$ARGS)
    - pattern: $VALUE.split_at($$$ARGS)
    - pattern: Semaphore::new($$$ARGS)
    - pattern: std::sync::Mutex::new($$$ARGS)
    - pattern: tokio::sync::Mutex::new($$$ARGS)
files:
  - src/**/*.rs
